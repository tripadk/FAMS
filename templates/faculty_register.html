{% extends "public_base.html" %}

{% block title %}Faculty Registration{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-900 via-blue-900 to-slate-900 flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-xl rounded-3xl bg-white/10 backdrop-blur-xl border border-white/20 p-6 sm:p-8 shadow-2xl">
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white grid place-items-center mb-3 shadow-lg">
                <i class="fa-solid fa-user-plus text-2xl"></i>
            </div>
            <h1 class="text-2xl font-semibold text-white">Faculty Registration</h1>
            <p class="text-slate-200 text-sm mt-1">Create your account to get started.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <div>
                <label for="name" class="block text-sm text-slate-100 mb-1">Name</label>
                <input type="text" id="name" name="name" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter your full name">
            </div>
            <div>
                <label for="email" class="block text-sm text-slate-100 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter your email">
            </div>
            <div>
                <label for="password" class="block text-sm text-slate-100 mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Create a password">
            </div>
            <div>
                <label for="department" class="block text-sm text-slate-100 mb-1">Department</label>
                <select id="department" name="department" required class="w-full p-3 border border-white/30 bg-white/20 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="" class="text-slate-900">Select Department</option>
                    <option value="CSE" class="text-slate-900">CSE</option>
                    <option value="CSM" class="text-slate-900">CSM</option>
                    <option value="CSO" class="text-slate-900">CSO</option>
                    <option value="CSD" class="text-slate-900">CSD</option>
                    <option value="AID" class="text-slate-900">AID</option>
                    <option value="CSB" class="text-slate-900">CSB</option>
                    <option value="ME" class="text-slate-900">ME</option>
                    <option value="ECE" class="text-slate-900">ECE</option>
                    <option value="RAI" class="text-slate-900">RAI</option>
                    <option value="EEE" class="text-slate-900">EEE</option>
                    <option value="CE" class="text-slate-900">CE</option>
                    <option value="CSY" class="text-slate-900">CSY</option>
                    <option value="AE" class="text-slate-900">AE</option>
                </select>
            </div>
            <div>
                <label for="designation" class="block text-sm text-slate-100 mb-1">Designation</label>
                <input type="text" id="designation" name="designation" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter your designation">
            </div>
            <div>
                <label for="profile_photo" class="block text-sm text-slate-100 mb-1">Profile Photo (optional)</label>
                <input type="file" id="profile_photo" name="profile_photo" accept=".jpg,.jpeg,.png" class="w-full p-3 border border-white/30 bg-white/20 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <p class="text-xs text-slate-300 mt-1">JPG/PNG, max 20MB.</p>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg transition shadow-lg">Register</button>
        </form>

        <div class="mt-4">
            <a href="{{ url_for('login_google') }}" class="w-full inline-flex items-center justify-center bg-white hover:bg-slate-100 text-slate-700 px-5 py-3 rounded-lg transition">
                <i class="fa-brands fa-google mr-2"></i> Sign in with Google
            </a>
        </div>

        <p class="text-center text-slate-200 text-sm mt-5">
            Already have an account?
            <a href="{{ url_for('faculty_login') }}" class="text-white font-medium hover:underline">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
