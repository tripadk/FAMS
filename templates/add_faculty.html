{% extends "base.html" %}

{% block title %}Add Faculty{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-6 sm:p-8">
        <h2 class="text-2xl font-semibold mb-6"><i class="fa-solid fa-user-plus mr-2 text-blue-600"></i>Add New Faculty</h2>
        <form method="POST" class="space-y-5">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                <input type="text" id="name" name="name" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" name="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="department" class="block text-sm font-medium text-slate-700 mb-1">Department</label>
                <input type="text" id="department" name="department" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Optional">
            </div>
            <div>
                <label for="designation" class="block text-sm font-medium text-slate-700 mb-1">Designation</label>
                <input type="text" id="designation" name="designation" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Optional">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg transition">Add Faculty</button>
        </form>
    </div>
</div>
{% endblock %}
