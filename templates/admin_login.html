{% extends "public_base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="login-icon">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2 class="login-title">Admin Login</h2>
            <p class="login-subtitle">Access the admin panel.</p>
        </div>
        <form method="POST">
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control login-input" placeholder="Enter your email" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control login-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn login-btn w-100">Login</button>
        </form>
    </div>
</div>

<style>
.login-container {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.login-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    max-width: 400px;
    width: 100%;
    color: white;
}

.login-icon {
    font-size: 4rem;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 20px;
}

.login-title {
    font-size: 2rem;
    font-weight: bold;
    margin-bottom: 10px;
    color: white;
}

.login-subtitle {
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 30px;
}

.form-label {
    color: white;
    font-weight: 500;
    margin-bottom: 8px;
}

.login-input {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    color: white;
    padding: 12px 16px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.login-input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.login-input:focus {
    background: rgba(255, 255, 255, 0.3);
    border-color: rgba(255, 255, 255, 0.8);
    box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.25);
    color: white;
}

.login-input:hover {
    background: rgba(255, 255, 255, 0.25);
}

.login-btn {
    background: linear-gradient(135deg, #ff6b6b 0%, #ffa726 100%);
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

.login-btn:hover {
    background: linear-gradient(135deg, #ff5252 0%, #fb8c00 100%);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
}

@media (max-width: 576px) {
    .login-card {
        padding: 30px 20px;
    }
    .login-icon {
        font-size: 3rem;
    }
    .login-title {
        font-size: 1.5rem;
    }
}
</style>
{% endblock %}
