{% extends 'base.html' %}

{% block title %}Add Achievement{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-6 sm:p-8">
        <h2 class="text-2xl font-semibold mb-6"><i class="fa-solid fa-plus mr-2 text-blue-600"></i>Add Achievement</h2>
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label for="title" class="block text-sm font-medium text-slate-700 mb-1">Title</label>
                <input type="text" id="title" name="title" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="type" class="block text-sm font-medium text-slate-700 mb-1">Type</label>
                <select id="type" name="type" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="All">All</option>
                    <option value="Publication">Publication</option>
                    <option value="Conference">Conference</option>
                    <option value="Workshop">Workshop</option>
                    <option value="Patent">Patent</option>
                    <option value="Award">Award</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                <textarea id="description" name="description" rows="4" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
            </div>
            <div>
                <label for="date" class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                <input type="date" id="date" name="date" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="proof_file" class="block text-sm font-medium text-slate-700 mb-1">Proof Document (PDF)</label>
                <input type="file" id="proof_file" name="proof_file" accept=".pdf" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="certificate" class="block text-sm font-medium text-slate-700 mb-1">Certificate (optional)</label>
                <input type="file" id="certificate" name="certificate" accept=".pdf" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <p class="text-xs text-slate-500 mt-1">PDF only, max 20MB.</p>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg transition">Add Achievement</button>
        </form>
    </div>
</div>
{% endblock %}
