{% extends 'base.html' %}

{% block title %}Add Achievement{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <h2 class="text-center mb-4"><i class="bi bi-plus-circle"></i> Add Achievement</h2>
            <form method="POST" enctype="multipart/form-data" class="card p-3 p-md-4 shadow main-form-card">
                <div class="mb-3">
                    <label for="title" class="form-label"><i class="bi bi-tag"></i> Title:</label>
                    <input type="text" id="title" name="title" class="form-control rounded-pill" required>
                </div>
                <div class="mb-3">
                    <label for="type" class="form-label"><i class="bi bi-tags"></i> Type:</label>
                    <select id="type" name="type" class="form-select rounded-pill" required>
                        <option value="Publication">Publication</option>
                        <option value="Conference">Conference</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Patent">Patent</option>
                        <option value="Award">Award</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label"><i class="bi bi-file-text"></i> Description:</label>
                    <textarea id="description" name="description" class="form-control rounded" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label"><i class="bi bi-calendar"></i> Date:</label>
                    <input type="date" id="date" name="date" class="form-control rounded-pill" required>
                </div>
                <div class="mb-3">
                    <label for="proof_file" class="form-label"><i class="bi bi-file-earmark-pdf"></i> Proof Document (PDF):</label>
                    <input type="file" id="proof_file" name="proof_file" class="form-control rounded-pill" accept=".pdf" required>
                </div>
                <div class="mb-3">
                    <label for="certificate" class="form-label"><i class="bi bi-award"></i> Certificate (PDF, Optional):</label>
                    <input type="file" id="certificate" name="certificate" class="form-control rounded-pill" accept=".pdf">
                    <small class="form-text text-muted">Upload your achievement certificate if available (PDF only, max 20MB).</small>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill"><i class="bi bi-check-circle"></i> Add Achievement</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
