{% extends "public_base.html" %}

{% block title %}Faculty Login{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-indigo-900 via-blue-900 to-slate-900 flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md rounded-3xl bg-white/10 backdrop-blur-xl border border-white/20 p-6 sm:p-8 shadow-2xl">
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-r from-blue-500 to-indigo-500 text-white grid place-items-center mb-3 shadow-lg">
                <i class="fa-solid fa-user-graduate text-2xl"></i>
            </div>
            <h1 class="text-2xl font-semibold text-white">Faculty Login</h1>
            <p class="text-slate-200 text-sm mt-1">Welcome back! Please sign in to your account.</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-sm text-slate-100 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter your email">
            </div>
            <div>
                <label for="password" class="block text-sm text-slate-100 mb-1">Password</label>
                <input type="password" id="password" name="password" required class="w-full p-3 border border-white/30 bg-white/20 text-white placeholder-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Enter your password">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg transition shadow-lg">Sign In</button>
        </form>

        <div class="mt-4">
            <a href="{{ url_for('login_google') }}" class="w-full inline-flex items-center justify-center bg-white hover:bg-slate-100 text-slate-700 px-5 py-3 rounded-lg transition">
                <i class="fa-brands fa-google mr-2"></i> Sign in with Google
            </a>
        </div>

        <p class="text-center text-slate-200 text-sm mt-5">
            Don’t have an account?
            <a href="{{ url_for('faculty_register') }}" class="text-white font-medium hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
