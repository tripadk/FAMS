<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Faculty Achievement Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .card-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .card-purple { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .card-green { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .card-orange { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; }
        .card-red { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; }
        .table-hover tbody tr:hover {
            background-color: rgba(0,0,0,.075);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <main class="col-12">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-info">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
