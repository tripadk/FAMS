{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-slate-100 p-6 sm:p-8">
        <h2 class="text-2xl font-semibold mb-6"><i class="fa-solid fa-user-pen mr-2 text-blue-600"></i>Edit Profile</h2>
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                <input type="text" id="name" name="name" value="{{ faculty.name }}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email (Read-only)</label>
                <input type="email" id="email" value="{{ faculty.email }}" disabled class="w-full p-3 border rounded-lg bg-slate-100 text-slate-500">
            </div>
            <div>
                <label for="department" class="block text-sm font-medium text-slate-700 mb-1">Department</label>
                <select id="department" name="department" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="All" {% if faculty.department == 'All' %}selected{% endif %}>All</option>
                    <option value="CSE" {% if faculty.department == 'CSE' %}selected{% endif %}>CSE</option>
                    <option value="CSM" {% if faculty.department == 'CSM' %}selected{% endif %}>CSM</option>
                    <option value="CSD" {% if faculty.department == 'CSD' %}selected{% endif %}>CSD</option>
                    <option value="CSO" {% if faculty.department == 'CSO' %}selected{% endif %}>CSO</option>
                    <option value="CSY" {% if faculty.department == 'CSY' %}selected{% endif %}>CSY</option>
                    <option value="AID" {% if faculty.department == 'AID' %}selected{% endif %}>AID</option>
                    <option value="CSB" {% if faculty.department == 'CSB' %}selected{% endif %}>CSB</option>
                    <option value="ECE" {% if faculty.department == 'ECE' %}selected{% endif %}>ECE</option>
                    <option value="EEE" {% if faculty.department == 'EEE' %}selected{% endif %}>EEE</option>
                    <option value="ME" {% if faculty.department == 'ME' %}selected{% endif %}>ME</option>
                    <option value="CE" {% if faculty.department == 'CE' %}selected{% endif %}>CE</option>
                    <option value="BT" {% if faculty.department == 'BT' %}selected{% endif %}>BT</option>
                    <option value="RAI" {% if faculty.department == 'RAI' %}selected{% endif %}>RAI</option>
                </select>
            </div>
            <div>
                <label for="designation" class="block text-sm font-medium text-slate-700 mb-1">Designation</label>
                <input type="text" id="designation" name="designation" value="{{ faculty.designation }}" required class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password (optional)</label>
                <input type="password" id="password" name="password" placeholder="Leave blank to keep current password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label for="profile_photo" class="block text-sm font-medium text-slate-700 mb-1">Profile Photo (optional)</label>
                <input type="file" id="profile_photo" name="profile_photo" accept=".jpg,.jpeg,.png" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <p class="text-xs text-slate-500 mt-1">JPG/PNG, max 20MB.</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <a href="{{ url_for('faculty_profile') }}" class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2 rounded-lg transition">Cancel</a>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg transition">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
